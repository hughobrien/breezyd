<!DOCTYPE html>
<!--
  Preserved for the Playwright suite ONLY. The daemon no longer serves this
  file: getIndex renders the templ Layout (see cmd/breezyd/ui_assets.go).
  Test fixtures read this file from disk to keep the existing JS-rendered
  test cases working through the PR1→PR3 transition. PR3 rewrites tests
  against a real daemon and this file gets deleted.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>breezyd</title>
<link rel="stylesheet" href="/ui/style-STYLEHASH.css">
</head>
<body>
  <header>
    <h1>breezyd</h1>
  </header>
  <div id="banner"></div>
  <div class="grid" id="grid"></div>
<script>
"use strict";

const POLL_INTERVAL_MS = 5000;
const STALE_THRESHOLD_MS = 90 * 1000;

let deviceNames = [];
const lastSnapshots = {}; // name -> {snapshot fields, _fetchedAt}
// State for in-flight writes. Disables that card's controls while pending.
const inFlight = {}; // name -> bool
// Per-control toasts. Cleared on next successful poll.
const toasts = {}; // name -> { control: msg }
// Per-card threshold editor state. name -> "humidity" | "co2" | "voc".
// Only one threshold can be edited per card at a time.
const editingThreshold = {}; // name -> kind
// Per-card open preset editor: 1 | 2 | 3 when a preset's supply/extract
// editor is visible. Cleared on preset re-click, manual-slider use, or
// when a different card is interacted with elsewhere (we leave it across
// re-renders so live polling doesn't slam the editor closed mid-drag).
const editingPreset = {};   // name -> 1 | 2 | 3
// Per-device automode flag. When set, activating a preset writes
// airflow_mode=ventilation (auto) regardless of the preset's editor
// state. When unset, activation derives airflow_mode from the per-
// preset editor state below (regen if both fans on; supply/extract if
// one was dragged to 0). Defaults to true (undefined → on) — most users
// just want "auto" until they explicitly opt out.
const automode = {};        // name -> bool
// Per-preset editor state. Tracks the user's last-known supply/extract
// pair for each preset, including the 0 case which the protocol
// register can't store (preset registers are 10-100; 0 is encoded via
// airflow_mode). Initialised lazily from the cached preset values when
// the editor opens; updated on slider drag. Persisted across editor
// open/close so a 0 dragged earlier still informs a later activation.
const presetVals = {};      // name -> { 1: {supply,extract}, 2: ..., 3: ... }
// Per-device optimistic live overlay. After a write that we KNOW affects
// fan pcts (mode switch, manual slider drag), we preemptively patch the
// snapshot's live.fan_*_{pct,rpm} so the UI doesn't sit at 0 during the
// poller's 12 s fan-settle window. Each entry: { expiresAt, fields }.
// 15 s TTL covers the settle plus a margin.
const optimisticLive = {}; // name -> { expiresAt, fan_supply_pct, fan_extract_pct, fan_supply_rpm, fan_extract_rpm }
// Per-card match-speeds toggle for the preset editor. Defaults to true
// (single-slider feel). False lets users set asymmetric supply/extract.
const matchSpeeds = {};     // name -> bool

// Per-card Device Info <details> open state. Set when the user expands
// it manually (captured via the toggle event below) and used during render
// so the panel survives the 5 s grid re-render. The auto-expand-on-fault
// rule ORs with this — a user-collapsed panel re-opens on the next render
// if a fault appears.
const deviceInfoOpen = {}; // name -> bool
// Same pattern for the ENERGY <details>: the 5 s grid re-render destroys
// and recreates the element, which would reset its open state otherwise.
const energyOpen = {};     // name -> bool
// Per-card Sensors <details> collapsed state. Default is expanded, so we
// track only when the user has explicitly collapsed it (presence == true).
// Survives the 5 s grid re-render via the toggle listener at the bottom of
// this file. Auto-expand on active alert wins over user collapse — when
// the alert clears, the collapse intent is preserved and re-applies.
const sensorsCollapsed = {}; // name -> true (absent = default expanded)

// Per-kind config for the editable sensor rows. Mirrors the daemon's
// SetThreshold validation: humidity 40-80, co2 400-2000 step 10, voc 50-250.
const THRESHOLD_KINDS = {
  humidity: { label: "RH",   suffix: "%",   min: 40,  max: 80,   step: 1,
              valueKey: "humidity_pct",   thresholdKey: "humidity_threshold_pct",  alertKey: "humidity",
              enabledKey: "humidity_sensor_enabled" },
  co2:      { label: "eCO₂", suffix: " ppm", min: 400, max: 2000, step: 10,
              valueKey: "eco2_ppm",       thresholdKey: "co2_threshold_ppm",       alertKey: "co2",
              enabledKey: "co2_sensor_enabled" },
  voc:      { label: "VOC",  suffix: " idx", min: 50,  max: 250,  step: 1,
              valueKey: "voc_index",      thresholdKey: "voc_threshold_index",     alertKey: "voc",
              enabledKey: "voc_sensor_enabled",
              tooltip: "VOC Index — Sensirion 0-500 scale, ~100 = baseline indoor air" },
};

async function bootstrap() {
  try {
    const r = await fetch("/v1/devices");
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    deviceNames = (data.devices || []).map(d => d.name).sort();
    clearBanner();
    render();
    await refreshAll();
    setInterval(refreshAll, POLL_INTERVAL_MS);
  } catch (e) {
    showBanner(`cannot reach daemon — is breezyd running? (${e.message})`);
    setTimeout(bootstrap, POLL_INTERVAL_MS);
  }
}

function showBanner(msg) {
  document.getElementById("banner").innerHTML =
    `<div class="err-banner" role="alert">${esc(msg)}</div>`;
}
function clearBanner() {
  document.getElementById("banner").innerHTML = "";
}

async function refreshAll() {
  const results = await Promise.allSettled(
    deviceNames.map(n =>
      fetch(`/v1/devices/${encodeURIComponent(n)}`)
        .then(r => r.ok ? r.json() : Promise.reject(new Error(`HTTP ${r.status}`)))
        .then(snap => ({ name: n, snap }))
    )
  );
  for (const res of results) {
    if (res.status === "fulfilled") {
      lastSnapshots[res.value.name] = applyOptimisticLive(res.value.name, { ...res.value.snap, _fetchedAt: Date.now() });
      // Clear all toasts for this device on a successful refresh.
      delete toasts[res.value.name];
    }
  }
  render();
}

// Set optimistic live values for a device. Used when we just wrote
// something that the daemon's cache won't reflect for ~12 s (settle
// window). The supplied fields are merged into snap.live until expiry.
function setOptimisticLive(name, fields, ttlMs = 15000) {
  optimisticLive[name] = { expiresAt: Date.now() + ttlMs, ...fields };
}

// Merge any active optimistic live overlay onto a snapshot. Expired
// entries are deleted lazily here.
function applyOptimisticLive(name, snap) {
  const o = optimisticLive[name];
  if (!o) return snap;
  if (Date.now() > o.expiresAt) {
    delete optimisticLive[name];
    return snap;
  }
  const overlay = {};
  for (const k of Object.keys(o)) {
    if (k !== "expiresAt") overlay[k] = o[k];
  }
  return { ...snap, live: { ...(snap.live ?? {}), ...overlay } };
}

function render() {
  document.getElementById("grid").innerHTML =
    deviceNames.map(name => renderCard(name, lastSnapshots[name])).join("");
}

function renderCard(name, snap) {
  if (!snap) {
    return `<div class="card stale">
      <h2>${esc(name)}</h2>
      <div class="ts">no data</div>
    </div>`;
  }
  const lastPollMs = snap.last_poll ? new Date(snap.last_poll).getTime() : 0;
  const ageMs = lastPollMs ? Date.now() - lastPollMs : Infinity;
  const stale = ageMs > STALE_THRESHOLD_MS;
  const power = snap.configured?.power;
  const powerLabel = power === true ? "on" : power === false ? "off" : "?";
  const powerCls  = power === true ? "power-on" : "power-off";

  const fwVersion = snap.firmware?.version ? esc(snap.firmware.version) : "—";
  const fwDate = snap.firmware?.build_date ? esc(snap.firmware.build_date) : "—";

  // Device Info <details> is collapsed by default. Auto-expand when a
  // service condition wants attention (active fault OR soiled filter),
  // OR when the user previously expanded it (deviceInfoOpen[name] survives
  // the 5 s re-render via the toggle listener at the bottom of the file).
  const fault = snap.service?.fault_level;
  const filter = snap.service?.filter_status;
  const needsAttention =
    (fault && fault !== "none") || (filter && filter !== "clean");
  const infoOpen = needsAttention || deviceInfoOpen[name] === true;
  // Power button shares the name row, sized to its content (not the
  // full-width treatment .toggle gets in the Controls block).
  const cardDis = (stale || inFlight[name]) ? "disabled" : "";
  return `<div class="card${stale ? " stale" : ""}">
    <details class="device-info"${infoOpen ? " open" : ""}>
      <summary>
        <h2>${esc(name)}</h2>
        <button class="toggle toggle-inline" data-action="power" data-name="${esc(name)}" ${cardDis}
          aria-pressed="${power === true ? "true" : "false"}">power</button>
      </summary>
      ${kv("ip",               esc(snap.ip || "?"))}
      ${kv("serial",           esc(snap.id || "?"))}
      ${kv("firmware version", fwVersion)}
      ${kv("firmware date",    fwDate)}
      ${kv("filter",           filterStatus(snap.service))}
      ${kv("motor",            humanSeconds(snap.service?.motor_lifetime_seconds))}
      ${kv("RTC",              fmt(snap.service?.rtc_battery_volts, "—", "V"))}
      ${kv("faults",           fmt(snap.service?.fault_level, "—"))}
    </details>
    ${(toasts[name] || {}).power ? `<div class="toast" role="alert">${esc(toasts[name].power)}</div>` : ""}
    ${stale ? `<div class="row"><span class="ts red">${lastPollMs ? humanAgo(ageMs) + " ago" : "no poll"}</span></div>` : ""}

    ${renderEnergy(name, snap)}

    ${(() => {
      const sa = snap.live?.sensor_alerts || {};
      const sensorAlerting = sa.humidity === true || sa.co2 === true || sa.voc === true;
      const sensorsExpanded = sensorAlerting || !sensorsCollapsed[name];
      return `<details class="block sensors"${sensorsExpanded ? " open" : ""}>
      <summary><h3>Sensors</h3></summary>
      ${sensorsGrid(name, snap)}
    </details>`;
    })()}

    ${renderSchedule(name, snap, stale)}

    ${renderControls(name, snap, stale)}
  </div>`;
}

function renderEnergy(name, snap) {
  const ev = snap.service?.energy;
  if (!ev) return "";
  // Default closed; survives the 5 s grid re-render via energyOpen state
  // tracked by the toggle listener at the bottom of this file.
  const open = energyOpen[name] === true ? " open" : "";
  const inner = ev.error
    ? `<div class="warn">${esc(ev.error)}</div>`
    : energyBody(ev);
  return `<details class="block energy"${open}>
    <summary><h3>ENERGY</h3></summary>
    ${inner}
  </details>`;
}

// scheduleEdits[name] holds the in-flight edit buffer. Cleared on save success.
const scheduleEdits = {};
const scheduleOpen = {};

function renderSchedule(name, snap, stale) {
  const sch = snap.service?.schedule;
  if (!sch) return ""; // no scheduler wired

  const alert = sch.alert === true;
  const open = alert || (scheduleOpen[name] === true);

  const edit = scheduleEdits[name];
  const enabled = edit ? edit.enabled : (sch.enabled === true);
  const entries = edit ? edit.entries : (sch.entries || []);

  const rows = entries.map((e, i) => renderScheduleRow(name, e, i, stale)).join("");
  const validation = validateSchedule(entries);

  return `<details class="block schedule"${open ? " open" : ""}>
    <summary><h3>SCHEDULE</h3></summary>
    <div class="schedule-toolbar">
      <label>
        <input type="checkbox" data-action="schedule-enabled" data-name="${esc(name)}"
               ${enabled ? "checked" : ""} ${stale ? "disabled" : ""}>
        enabled
      </label>
      <span class="grow"></span>
      <button data-action="schedule-add" data-name="${esc(name)}" ${stale ? "disabled" : ""}>+ add entry</button>
      <button data-action="schedule-save" data-name="${esc(name)}"
              ${stale || !validation.ok ? "disabled" : ""}
              title="${esc(validation.tooltip)}">save</button>
    </div>
    ${entries.length === 0 ? `<div class="ctrl-label">no entries</div>` : `
      <table class="schedule-table">
        <thead><tr><th>at</th><th>mode</th><th>fan</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`}
    ${alert && sch.last_apply
      ? `<div class="warn">⚠ last apply ${esc(formatScheduleAt(sch.last_apply.at))} failed: ${esc(sch.last_apply.err || "")}
         ${sch.last_apply.retries > 0 ? `<br>retried ${sch.last_apply.retries} times` : ""}</div>`
      : ""}
    ${(toasts[name] || {}).schedule ? `<div class="toast" role="alert">${esc(toasts[name].schedule)}</div>` : ""}
  </details>`;
}

function renderScheduleRow(name, e, i, stale) {
  const dis = stale ? "disabled" : "";
  const isOff = e.action === "off";
  // Display labels match the Mode block in Controls (auto/regen/supply/exhaust);
  // wire values stay as the canonical strings the daemon validates against.
  const actions = [
    { value: "ventilation",  label: "auto" },
    { value: "regeneration", label: "regen" },
    { value: "supply",       label: "supply" },
    { value: "extract",      label: "exhaust" },
    { value: "off",          label: "off" },
  ];
  const opts = actions.map(a =>
    `<option value="${a.value}"${e.action === a.value ? " selected" : ""}>${a.label}</option>`
  ).join("");
  const pctClass = isOff ? "pct-disabled" : "";
  const pctReadonly = isOff ? "readonly" : "";
  return `<tr data-row="${i}" data-name="${esc(name)}">
    <td><input type="text" inputmode="numeric" maxlength="5"
               pattern="^([01][0-9]|2[0-3]):[0-5][0-9]$"
               class="at" placeholder="HH:MM"
               data-action="schedule-at" data-row="${i}" data-name="${esc(name)}"
               value="${esc(e.at || "")}" ${dis}></td>
    <td><select data-action="schedule-action" data-row="${i}" data-name="${esc(name)}" ${dis}>${opts}</select></td>
    <td><input type="number" min="10" max="100" data-action="schedule-pct" data-row="${i}" data-name="${esc(name)}"
               class="${pctClass}" value="${e.pct ?? 60}" ${pctReadonly} ${dis}></td>
    <td><button class="del" data-action="schedule-del" data-row="${i}" data-name="${esc(name)}" ${dis}>×</button></td>
  </tr>`;
}

function validateSchedule(entries) {
  if (entries.length > 24) return { ok: false, tooltip: "at most 24 entries" };
  const seen = new Set();
  for (const e of entries) {
    if (!/^\d{2}:\d{2}$/.test(e.at || "")) return { ok: false, tooltip: "missing or invalid time" };
    const [h, m] = e.at.split(":").map(Number);
    if (h > 23 || m > 59) return { ok: false, tooltip: `invalid time ${e.at}` };
    if (seen.has(e.at)) return { ok: false, tooltip: `two entries at ${e.at}` };
    seen.add(e.at);
    const pct = Number(e.pct);
    if (!Number.isFinite(pct) || pct > 100) return { ok: false, tooltip: "pct must be ≤ 100" };
    if (e.action !== "off" && pct < 10) return { ok: false, tooltip: "pct must be 10-100 for non-off actions" };
  }
  return { ok: true, tooltip: "" };
}

function formatScheduleAt(at) {
  // last_apply.at is a ScheduleTime int (minute-of-day) over JSON.
  if (typeof at === "number") {
    const h = Math.floor(at / 60);
    const m = at % 60;
    return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
  }
  return String(at ?? "");
}

function energyBody(ev) {
  const fmtKwh = (v) => `${(v ?? 0).toFixed(2)} kWh`;
  const fmtW   = (v) => `${Math.round(v ?? 0)} W`;
  // COP = useful-work / consumed. Renders as 1-dp number; "—" when
  // consumed is zero / non-positive / non-finite to avoid Infinity/NaN.
  const fmtCop = (num, den) => {
    if (!den || den <= 0) return "—";
    const r = Math.abs(num) / den;
    if (!isFinite(r)) return "—";
    return r.toFixed(1);
  };

  const w = ev.instant_w ?? 0;
  let regenPower;
  if (w > 0)      regenPower = `${fmtW(w)} heating`;
  else if (w < 0) regenPower = `${fmtW(-w)} cooling`;
  else            regenPower = "0 W";

  const regenCost = fmtW(ev.consumed_w ?? 0);
  const copNow    = fmtCop(ev.instant_w ?? 0, ev.consumed_w ?? 0);

  const copToday    = fmtCop((ev.heating_today_kwh ?? 0)    + (ev.cooling_today_kwh ?? 0),    ev.consumed_today_kwh);
  const copMonth    = fmtCop((ev.heating_month_kwh ?? 0)    + (ev.cooling_month_kwh ?? 0),    ev.consumed_month_kwh);
  const copLifetime = fmtCop((ev.heating_lifetime_kwh ?? 0) + (ev.cooling_lifetime_kwh ?? 0), ev.consumed_lifetime_kwh);

  const cell = (label, value) =>
    `<div class="sensor-cell"><div class="sensor-label">${esc(label)}</div><div>${esc(value)}</div></div>`;

  return `<div class="sensor-grid energy-grid">
    ${cell("regen power",    regenPower)}
    ${cell("regen cost",     regenCost)}
    ${cell("COP",            copNow)}
    ${cell("COP today",      copToday)}
    ${cell("COP month",      copMonth)}
    ${cell("COP lifetime",   copLifetime)}
    ${cell("heating today",    fmtKwh(ev.heating_today_kwh))}
    ${cell("heating month",    fmtKwh(ev.heating_month_kwh))}
    ${cell("heating lifetime", fmtKwh(ev.heating_lifetime_kwh))}
    ${cell("cooling today",    fmtKwh(ev.cooling_today_kwh))}
    ${cell("cooling month",    fmtKwh(ev.cooling_month_kwh))}
    ${cell("cooling lifetime", fmtKwh(ev.cooling_lifetime_kwh))}
    ${cell("consumed today",    fmtKwh(ev.consumed_today_kwh))}
    ${cell("consumed month",    fmtKwh(ev.consumed_month_kwh))}
    ${cell("consumed lifetime", fmtKwh(ev.consumed_lifetime_kwh))}
  </div>`;
}

function kv(k, v) {
  return `<div class="row"><span class="k">${esc(k)}</span><span>${v}</span></div>`;
}

// Unified 2-column Sensors grid. Six rows pair semantically:
//   eCO₂ / VOC, RH / recovery, supply / exhaust temps, post-HRV temps
//   (supply_regen / exhaust_regen), supply Δ / exhaust Δ, supply rpm /
//   exhaust rpm. The threshold-bearing cells (RH, eCO₂, VOC) stay
//   clickable to open the inline threshold editor.
function sensorsGrid(name, snap) {
  const s = snap.sensors || {};
  const live = snap.live || {};
  // Δ = post-HRV − pre-HRV. Supply path gains heat (+), exhaust loses (−).
  const supplyDelta = tempDelta(s.temp_supply_c, s.temp_outdoor_c);
  const exhaustDelta = tempDelta(s.temp_exhaust_outlet_c, s.temp_exhaust_inlet_c);
  return `<div class="sensor-grid">
    ${thresholdCell(name, "co2", snap)}
    ${thresholdCell(name, "voc", snap)}
    ${thresholdCell(name, "humidity", snap)}
    ${plainCell("recovery", fmt(s.recovery_efficiency_pct, "—", "%"))}
    ${plainCell("supply",        tempC(s.temp_outdoor_c))}
    ${plainCell("exhaust",       tempC(s.temp_exhaust_inlet_c))}
    ${plainCell("supply_regen",  tempC(s.temp_supply_c))}
    ${plainCell("exhaust_regen", tempC(s.temp_exhaust_outlet_c))}
    ${plainCell("Δ", supplyDelta)}
    ${plainCell("Δ", exhaustDelta)}
    ${plainCell("supply rpm",  rpmText(live.fan_supply_rpm))}
    ${plainCell("exhaust rpm", rpmText(live.fan_extract_rpm))}
  </div>${thresholdEditor(name, snap)}`;
}

function plainCell(label, value) {
  return `<div class="sensor-cell"><div class="sensor-label">${esc(label)}</div><div>${value}</div></div>`;
}

function rpmText(v) {
  if (v === null || v === undefined) return "—";
  if (v === 0) return "off";
  return `${esc(String(v))} rpm`;
}

function thresholdCell(name, kind, snap) {
  const cfg = THRESHOLD_KINDS[kind];
  const live = snap.sensors?.[cfg.valueKey];
  const alerting = snap.live?.sensor_alerts?.[cfg.alertKey] === true;
  const liveStr = (live === null || live === undefined) ? "—" : `${live}${cfg.suffix}`;
  const liveCls = alerting ? "alert-fire" : "";
  const titleAttr = cfg.tooltip ? ` title="${esc(cfg.tooltip)}"` : "";
  const editing = editingThreshold[name] === kind;
  let body;
  if (editing) {
    const thresh = snap.configured?.[cfg.thresholdKey];
    const stale = (snap._fetchedAt
      ? (Date.now() - new Date(snap.last_poll).getTime()) > STALE_THRESHOLD_MS
      : false);
    const dis = (inFlight[name] || stale) ? "disabled" : "";
    const inputVal = (thresh === null || thresh === undefined) ? cfg.min : thresh;
    const enabledKey = cfg.enabledKey;
    const enabledNow = snap.configured?.[enabledKey];
    // default-on when missing/true; only render unchecked for explicit false
    const checkedAttr = (enabledNow === false) ? "" : " checked";
    body = `<span class="thresh-edit-inline">
      <input type="number" min="${cfg.min}" max="${cfg.max}" step="${cfg.step}"
             value="${inputVal}"
             data-name="${esc(name)}" data-kind="${esc(kind)}"
             class="thresh-input" ${dis}>
      <label class="thresh-auto-fan">
        <input type="checkbox" class="thresh-auto-fan-input"
               data-name="${esc(name)}" data-kind="${esc(kind)}"${checkedAttr} ${dis}>
        auto fan
      </label>
      <button data-action="threshold-save" data-name="${esc(name)}" data-kind="${esc(kind)}" ${dis}>✓</button>
      <button data-action="threshold-cancel" data-name="${esc(name)}" data-kind="${esc(kind)}" ${dis}>✕</button>
    </span>`;
  } else {
    body = `<div class="value-clickable ${liveCls}"
         data-action="edit-threshold" data-name="${esc(name)}" data-kind="${esc(kind)}"
         >${esc(liveStr)}</div>`;
  }
  return `<div class="sensor-cell"${titleAttr}>
    <div class="sensor-label">${esc(cfg.label)}</div>
    ${body}
  </div>`;
}

// With the editor now rendered inline inside thresholdCell, this helper only
// emits any leftover threshold-<kind> error toasts below the grid.
function thresholdEditor(name, snap) {
  const t = toasts[name] || {};
  return ["humidity", "co2", "voc"].map(k =>
    t["threshold-" + k] ? `<div class="toast" role="alert">${esc(t["threshold-" + k])}</div>` : ""
  ).join("");
}

function tempC(v) {
  return (v === null || v === undefined) ? "—" : `${esc(v.toFixed(1))}°C`;
}

// 3x2 temperature grid: each row shows pre-HRV / post-HRV / delta. The
// "_regen" suffix on a label means "after the heat-recovery exchanger";
// the bare label is the pre-HRV side. Δ shows how much heat the air
// gained (supply path) or lost (exhaust path) crossing the exchanger.
function tempDelta(a, b) {
  if (a === null || a === undefined || b === null || b === undefined) return "—";
  const d = a - b;
  const sign = d >= 0 ? "+" : "";
  return `${sign}${esc(d.toFixed(1))}°C`;
}

function fmt(v, fallback, suffix) {
  if (v === null || v === undefined) return fallback;
  return `${esc(String(v))}${suffix || ""}`;
}

function filterStatus(svc) {
  if (!svc) return "—";
  const status = svc.filter_status || "—";
  const remaining = svc.filter_remaining_seconds;
  if (remaining === undefined) return esc(status);
  const days = Math.floor(remaining / 86400);
  return `${esc(status)} (${days}d)`;
}

function humanAgo(ms) {
  const s = Math.max(0, Math.floor(ms / 1000));
  if (s < 60) return `${s}s`;
  const m = Math.floor(s / 60);
  if (m < 60) return `${m}m ${s % 60}s`;
  const h = Math.floor(m / 60);
  return `${h}h ${m % 60}m`;
}

function humanSeconds(secs) {
  if (secs === null || secs === undefined) return "—";
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  return `${h}h ${m}m`;
}

function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

function renderControls(name, snap, stale) {
  const cfg = snap.configured || {};
  const disabled = stale || inFlight[name];
  const power = cfg.power === true;
  const heater = cfg.heater_enabled === true;
  const mode = cfg.airflow_mode || "";
  const speedMode = cfg.speed_mode || "";  // "preset1".."preset3" | "manual"
  const manualPct = typeof cfg.manual_pct === "number" ? cfg.manual_pct : 50;
  const dis = disabled ? "disabled" : "";
  const t = toasts[name] || {};

  const specialMode = snap.live?.special_mode || "off";  // "off" | "night" | "turbo"
  const remainingSecs = snap.live?.special_mode_remaining_seconds;

  const timerBtn = (label, value) =>
    `<button data-action="timer" data-name="${esc(name)}" data-value="${esc(value)}" ${dis}
        aria-pressed="${specialMode === value ? "true" : "false"}">${esc(label)}</button>`;

  const modeBtn = (label, value) =>
    `<button data-action="mode" data-name="${esc(name)}" data-value="${esc(value)}" ${dis}
        aria-pressed="${mode === value ? "true" : "false"}">${esc(label)}</button>`;

  // Preset button labels show the configured supply/extract pcts so the
  // user can pick a preset by its actual speed values (the previous
  // low/med/high was an arbitrary mapping that didn't reflect the
  // device's stored numbers). "—" if the cache hasn't loaded the
  // configured.presetN entry yet.
  const presetLabel = (n) => {
    const p = cfg["preset" + n];
    const s = typeof p?.supply === "number" ? p.supply : "—";
    const e = typeof p?.extract === "number" ? p.extract : "—";
    return `${s}/${e}`;
  };
  const presetBtn = (n) =>
    `<button data-action="preset" data-name="${esc(name)}" data-value="${n}" ${dis}
        aria-pressed="${speedMode === "preset" + n ? "true" : "false"}">${presetLabel(n)}</button>`;
  const manualBtn = () =>
    `<button data-action="manual-speed" data-name="${esc(name)}" ${dis}
        aria-pressed="${speedMode === "manual" ? "true" : "false"}">manual</button>`;

  const editing = editingPreset[name];
  // editor is only meaningful for an active preset — manual mode never has one.
  const editorOpen = typeof editing === "number" && speedMode === "preset" + editing;
  const matchOn = matchSpeeds[name] !== false; // default true


  return `<div class="controls">
    <h3>Controls</h3>

    <div class="ctrl">
      <span class="ctrl-label">SPEED</span>
      <div class="seg">
        ${presetBtn(1)}
        ${presetBtn(2)}
        ${presetBtn(3)}
        ${manualBtn()}
      </div>
      ${speedMode === "manual" && specialMode === "off" ? `
        <span class="ctrl-label">MODE</span>
        <div class="seg">
          ${modeBtn("auto",    "ventilation")}
          ${modeBtn("regen",   "regeneration")}
          ${modeBtn("supply",  "supply")}
          ${modeBtn("exhaust", "extract")}
        </div>
        ${t.mode ? `<div class="toast" role="alert">${esc(t.mode)}</div>` : ""}
      ` : ""}
      ${speedMode === "manual" && specialMode === "off"
        ? manualSliderRow(name, snap.live, manualPct, !disabled && !editorOpen)
        : ""}
      ${editorOpen ? presetEditor(name, editing, cfg, matchOn, dis) : ""}
      ${t.speed ? `<div class="toast" role="alert">${esc(t.speed)}</div>` : ""}
    </div>

    <div class="ctrl ctrl-pair">
      <div class="ctrl-group ctrl-group-timer">
        <span class="ctrl-label">TIMER</span>
        <div class="seg">
          ${timerBtn("night", "night")}
          ${timerBtn("turbo", "turbo")}
        </div>
        ${specialMode !== "off" && typeof remainingSecs === "number"
          ? `<div class="ctrl-label timer-remaining">${esc(humanSeconds(remainingSecs))} remaining</div>`
          : ""}
        ${t.timer ? `<div class="toast" role="alert">${esc(t.timer)}</div>` : ""}
      </div>
      <div class="ctrl-group ctrl-group-heater">
        <span class="ctrl-label">HEATER</span>
        <div class="seg">
          <button class="toggle" data-action="heater" data-name="${esc(name)}" ${dis}
            aria-pressed="${heater ? "true" : "false"}">heater</button>
        </div>
        ${t.heater ? `<div class="toast" role="alert">${esc(t.heater)}</div>` : ""}
      </div>
    </div>

  </div>`;
}

// Renders one fan's slider row in the Speed control. Layout is
// side-label / rpm / slider / pct. The slider thumb tracks the LIVE fan
// pct (not the manual control state), so a fan that's firmware-forced
// to 0 in single-direction modes shows thumb at 0 honestly. The slider
// is interactive only for the fan that's actually running per
// airflow_mode (computed by the caller).
//
// min=0 lets the disabled 0% case render correctly; the change handler
// clamps POST values to >=10 so the protocol's writable range is
// respected when the user drags.
function fanSliderRow(name, side, _rpm, livePct, interactive) {
  // rpm moved to the Sensors block; this row now reads side-label /
  // slider / live pct.
  const pctLabel = (livePct === null || livePct === undefined) ? "—" : `${esc(String(livePct))}%`;
  const thumbVal = (typeof livePct === "number") ? livePct : 0;
  // Interactive sliders use min=10 so the protocol's writable range
  // matches the visual track — at 10% the thumb sits at the far left
  // and the user can see they can't drag further. Disabled (off-fan)
  // rows use min=0 so a fan reading 0% renders honestly at zero
  // instead of clamping to the 10% position.
  const sliderMin = interactive ? 10 : 0;
  const disAttr = interactive ? "" : "disabled";
  return `<div class="slider-row fan-slider-row">
    <span class="fan-side">${esc(side)}</span>
    <input type="range" min="${sliderMin}" max="100" step="1" value="${thumbVal}"
      data-action="manual-slider" data-name="${esc(name)}" data-side="${esc(side)}" ${disAttr}>
    <span class="val">${pctLabel}</span>
  </div>`;
}

// Renders the single combined slider used when the device is in manual
// speed_mode. One row replaces the per-fan dual rows because manual mode
// has a single shared %; showing two rows where one is a disabled mirror
// is just clutter. Left rpm is the running fan's rpm (or "off" if both
// fans are at 0); right pct is manual_pct (the setpoint, which the slider
// thumb tracks). data-side="manual" so tests can scope to this row
// without colliding with the per-fan rows in preset modes.
function manualSliderRow(name, _live, manualPct, interactive) {
  // rpm moved to the Sensors block; this row is now just the slider
  // and the manual_pct setpoint readout.
  const sliderMin = interactive ? 10 : 0;
  const disAttr = interactive ? "" : "disabled";
  return `<div class="slider-row fan-slider-row">
    <span class="fan-side"></span>
    <input type="range" min="${sliderMin}" max="100" step="1" value="${manualPct}"
      data-action="manual-slider" data-name="${esc(name)}" data-side="manual" ${disAttr}>
    <span class="val">${esc(String(manualPct))}%</span>
  </div>`;
}

// Renders the per-preset edit UI: a "match speeds" checkbox plus two
// sliders (supply / extract). Values come from the cached configured
// snapshot so the sliders track what the device thinks the preset is.
function presetEditor(name, preset, cfg, matchOn, dis) {
  const entry = cfg["preset" + preset] || {};
  // Per-preset memory wins over cache: it preserves the user's 0-side
  // intent across editor open/close (the cached register can't store 0).
  const stored = (presetVals[name] || {})[preset];
  const supplyVal = stored && typeof stored.supply === "number"
    ? stored.supply
    : (typeof entry.supply === "number" ? entry.supply : 50);
  const extractVal = stored && typeof stored.extract === "number"
    ? stored.extract
    : (typeof entry.extract === "number" ? entry.extract : 50);
  const matchAttr = matchOn ? "checked" : "";
  const autoAttr = automode[name] !== false ? "checked" : ""; // default true
  return `<div class="preset-editor">
    <label class="match-speeds">
      <input type="checkbox" data-action="automode-toggle" data-name="${esc(name)}"
        ${autoAttr} ${dis}>
      automode
    </label>
    <label class="match-speeds">
      <input type="checkbox" data-action="match-speeds-toggle" data-name="${esc(name)}"
        ${matchAttr} ${dis}>
      match speeds
    </label>
    <div class="slider-row">
      <span class="val-label">supply</span>
      <input type="range" min="0" max="100" step="1" value="${supplyVal}"
        data-action="preset-supply-slider" data-name="${esc(name)}"
        data-preset="${preset}" ${dis}>
      <span class="val">${supplyVal}%</span>
    </div>
    <div class="slider-row">
      <span class="val-label">exhaust</span>
      <input type="range" min="0" max="100" step="1" value="${extractVal}"
        data-action="preset-extract-slider" data-name="${esc(name)}"
        data-preset="${preset}" ${dis}>
      <span class="val">${extractVal}%</span>
    </div>
  </div>`;
}

// Single delegated click handler for all control buttons and clickable
// values (the threshold edit-target). Match any [data-action] so spans
// like the threshold value can dispatch alongside <button>s.
document.addEventListener("click", async (ev) => {
  const el = ev.target.closest("[data-action]");
  if (!el) return;
  // Action buttons inside a <summary> would otherwise trigger the
  // <details> default toggle as the click bubbles up. preventDefault
  // cancels that without affecting our action dispatch below.
  if (el.closest("summary")) {
    ev.preventDefault();
  }
  const name = el.dataset.name;
  const action = el.dataset.action;
  const value = el.dataset.value;
  const kind = el.dataset.kind;
  const snap = lastSnapshots[name];
  if (!snap) return;

  switch (action) {
    case "power":
      await postWrite(name, "power", "/v1/devices/" + encodeURIComponent(name) + "/power",
                      { on: !snap.configured?.power });
      break;
    case "mode": {
      // Mode change implicitly dismisses any open preset editor — the
      // user's attention has shifted to airflow direction, not the
      // preset's per-fan numbers.
      delete editingPreset[name];
      // Carry the speed-of-record across the mode switch so the newly-
      // active fan(s) ramp to the same %, instead of the off-fan
      // starting from 0. Take the higher of supply/extract live pcts:
      // in single-direction modes the inactive fan reads 0, so max() is
      // the previously-active fan's speed; in dual-direction modes both
      // are equal so max() is a no-op. Only applies in manual speed_mode
      // — preset modes have their own per-preset stored speeds and a
      // manual write would kick the user out of them.
      const prevSpeedMode = snap.configured?.speed_mode;
      const supplyPct = snap.live?.fan_supply_pct;
      const extractPct = snap.live?.fan_extract_pct;
      const a = typeof supplyPct === "number" ? supplyPct : -1;
      const b = typeof extractPct === "number" ? extractPct : -1;
      const preservePct = Math.max(a, b);
      await postWrite(name, "mode", "/v1/devices/" + encodeURIComponent(name) + "/mode",
                      { mode: value });
      if (prevSpeedMode === "manual" && preservePct >= 10) {
        await postWrite(name, "speed", "/v1/devices/" + encodeURIComponent(name) + "/speed",
                        { manual: preservePct });
      }
      // Optimistic UI: the daemon's cache won't reflect new fan_*_pct
      // until the 12 s fan-settle window ends. We just wrote both 0xB7
      // (mode) and (in manual mode) 0x44 (manual_pct), so we know what
      // the active fan(s) will be at. Predict per-fan based on which
      // run in the new mode, masked by speed_mode (preset still uses
      // its stored per-fan pcts).
      const supplyRuns = value === "ventilation" || value === "regeneration" || value === "supply";
      const extractRuns = value === "ventilation" || value === "regeneration" || value === "extract";
      let supplyTargetPct, extractTargetPct;
      if (prevSpeedMode === "manual") {
        const m = preservePct >= 10 ? preservePct : (snap.configured?.manual_pct ?? 0);
        supplyTargetPct = m;
        extractTargetPct = m;
      } else if (typeof prevSpeedMode === "string" && prevSpeedMode.startsWith("preset")) {
        const cur = snap.configured?.[prevSpeedMode] ?? {};
        supplyTargetPct = typeof cur.supply === "number" ? cur.supply : 0;
        extractTargetPct = typeof cur.extract === "number" ? cur.extract : 0;
      } else {
        supplyTargetPct = 0;
        extractTargetPct = 0;
      }
      setOptimisticLive(name, {
        fan_supply_pct: supplyRuns ? supplyTargetPct : 0,
        fan_extract_pct: extractRuns ? extractTargetPct : 0,
        // RPM unknown until next real poll — show "— rpm" rather than
        // a stale or zero value while the fan ramps.
        fan_supply_rpm: supplyRuns ? null : 0,
        fan_extract_rpm: extractRuns ? null : 0,
      });
      if (lastSnapshots[name]) {
        lastSnapshots[name] = applyOptimisticLive(name, lastSnapshots[name]);
        render();
      }
      break;
    }
    case "manual-speed": {
      // Switch to manual speed_mode without changing the running speed:
      // POST manual: cached manual_pct (or 50 if absent). Closes any
      // open preset editor since manual mode has no per-preset state.
      delete editingPreset[name];
      const pct = typeof snap.configured?.manual_pct === "number" ? snap.configured.manual_pct : 50;
      await postWrite(name, "speed", "/v1/devices/" + encodeURIComponent(name) + "/speed",
                      { manual: pct });
      break;
    }
    case "preset": {
      const n = parseInt(value, 10);
      const speedMode = snap.configured?.speed_mode || "";
      const alreadyOnPreset = speedMode === "preset" + n;
      // First click activates the preset (no editor); the editor opens
      // only on a subsequent click of the already-active preset, and a
      // third click closes it again. Click flow:
      //   Inactive preset → activate (no editor).
      //   Active preset, editor closed → open editor.
      //   Active preset, editor open → close editor.
      if (alreadyOnPreset && editingPreset[name] === n) {
        delete editingPreset[name];
        render();
      } else if (alreadyOnPreset) {
        editingPreset[name] = n;
        render();
      } else {
        // Activate the preset (no editor) and write airflow_mode per
        // automode + the per-preset (supply, extract) memory. Falls back
        // to the cached preset register values if the user has never
        // edited this preset's editor (registers are 10..100 so both
        // are nonzero → regeneration with automode off, ventilation
        // with automode on).
        await postWrite(name, "speed", "/v1/devices/" + encodeURIComponent(name) + "/speed",
                        { preset: n });
        const stored = (presetVals[name] || {})[n];
        const cur = snap.configured?.["preset" + n] || {};
        const supply = stored && typeof stored.supply === "number"
          ? stored.supply
          : (typeof cur.supply === "number" ? cur.supply : 50);
        const extract = stored && typeof stored.extract === "number"
          ? stored.extract
          : (typeof cur.extract === "number" ? cur.extract : 50);
        const desiredMode = computeAirflow(name, supply, extract);
        const currentMode = lastSnapshots[name]?.configured?.airflow_mode;
        if (desiredMode && desiredMode !== currentMode) {
          await applyAirflow(name, desiredMode, supply, extract);
        }
      }
      break;
    }
    case "heater":
      await postWrite(name, "heater", "/v1/devices/" + encodeURIComponent(name) + "/heater",
                      { on: !snap.configured?.heater_enabled });
      break;
    case "timer": {
      // Toggle: clicking the already-active mode stops the timer.
      const current = snap.live?.special_mode || "off";
      const next = current === value ? "off" : value;
      await postWrite(name, "timer", "/v1/devices/" + encodeURIComponent(name) + "/timer",
                      { mode: next });
      break;
    }
    case "schedule-add":
      ensureScheduleEdit(name);
      scheduleEdits[name].entries.push({ at: "08:00", action: "regeneration", pct: 60 });
      render();
      break;
    case "schedule-del": {
      const idx = Number(el.dataset.row);
      ensureScheduleEdit(name);
      scheduleEdits[name].entries.splice(idx, 1);
      render();
      break;
    }
    case "schedule-save": {
      const buf = scheduleEdits[name];
      if (!buf) break;
      const cleaned = buf.entries.map(en => ({
        at: en.at,
        action: en.action,
        pct: Math.max(10, Math.min(100, Number(en.pct) || 10)),
      }));
      const ok = await postWrite(name, "schedule",
        "/v1/devices/" + encodeURIComponent(name) + "/schedule",
        { enabled: buf.enabled, entries: cleaned },
        "PUT");
      if (ok) delete scheduleEdits[name];
      break;
    }
    case "edit-threshold":
      editingThreshold[name] = kind;
      render();
      // Focus the freshly-rendered input so users can type immediately.
      const input = document.querySelector(
        `.thresh-input[data-name="${name}"][data-kind="${kind}"]`);
      if (input) { input.focus(); input.select(); }
      break;
    case "threshold-save":
      await saveThreshold(name, kind);
      break;
    case "threshold-cancel":
      delete editingThreshold[name];
      render();
      break;
  }
});

// Enter saves, Escape cancels while inside a threshold-edit input.
document.addEventListener("keydown", async (ev) => {
  const el = ev.target;
  if (!el.classList || !el.classList.contains("thresh-input")) return;
  if (ev.key === "Enter") {
    ev.preventDefault();
    await saveThreshold(el.dataset.name, el.dataset.kind);
  } else if (ev.key === "Escape") {
    ev.preventDefault();
    delete editingThreshold[el.dataset.name];
    render();
  }
});

async function saveThreshold(name, kind) {
  const input = document.querySelector(
    `.thresh-input[data-name="${name}"][data-kind="${kind}"]`);
  const cb = document.querySelector(
    `.thresh-auto-fan-input[data-name="${name}"][data-kind="${kind}"]`);
  if (!input || !cb) return;
  const value = parseInt(input.value, 10);
  if (isNaN(value)) return;
  const cfg = THRESHOLD_KINDS[kind];
  const snap = lastSnapshots[name] || {};
  const prevValue = snap.configured?.[cfg.thresholdKey];
  const prevEnabled = snap.configured?.[cfg.enabledKey] !== false; // default-on when missing/true; matches the renderer's checkedAttr
  const enabledNow = cb.checked;
  const body = { kind };
  let dirty = false;
  if (value !== prevValue) { body.value = value; dirty = true; }
  if (enabledNow !== prevEnabled) { body.enabled = enabledNow; dirty = true; }
  if (!dirty) {
    delete editingThreshold[name];
    render();
    return;
  }
  const ok = await postWrite(name, "threshold-" + kind,
    "/v1/devices/" + encodeURIComponent(name) + "/threshold", body);
  if (ok) {
    delete editingThreshold[name];
    render();
  }
}

// Capture-phase listener for `toggle` events on Device <details> elements.
// `toggle` does not bubble, so capture is required to intercept it. The
// device name is read from the card's <h2> rather than threading a
// data-attribute through, which keeps the markup minimal.
document.addEventListener("toggle", (ev) => {
  const el = ev.target;
  const name = el.closest(".card")?.querySelector("h2")?.textContent;
  if (!name) return;
  if (el.classList?.contains("device-info")) {
    if (el.open) deviceInfoOpen[name] = true;
    else delete deviceInfoOpen[name];
  } else if (el.classList?.contains("energy")) {
    if (el.open) energyOpen[name] = true;
    else delete energyOpen[name];
  } else if (el.classList?.contains("sensors")) {
    // Inverted: state map tracks user-collapsed (since default is open).
    if (el.open) delete sensorsCollapsed[name];
    else sensorsCollapsed[name] = true;
  } else if (el.classList?.contains("schedule")) {
    if (el.open) scheduleOpen[name] = true;
    else delete scheduleOpen[name];
  }
}, true);

function ensureScheduleEdit(name) {
  if (scheduleEdits[name]) return;
  // Seed edit buffer from latest server snapshot.
  const sch = lastSnapshots[name]?.service?.schedule || { enabled: false, entries: [] };
  scheduleEdits[name] = {
    enabled: sch.enabled === true,
    entries: (sch.entries || []).map(e => ({ at: e.at, action: e.action, pct: e.pct })),
  };
}

// Schedule cell edits go through the input/change listener (not click)
// because time inputs and selects fire `input`/`change`, not `click`.
document.addEventListener("input", (ev) => {
  const el = ev.target;
  if (el instanceof HTMLInputElement || el instanceof HTMLSelectElement) {
    const action = el.dataset.action;
    const name = el.dataset.name;
    const rowIdx = Number(el.dataset.row);
    if (name) {
      if (action === "schedule-enabled") {
        ensureScheduleEdit(name);
        scheduleEdits[name].enabled = el.checked;
        render();
        return;
      }
      if (!Number.isNaN(rowIdx) && (action === "schedule-at" || action === "schedule-action" || action === "schedule-pct")) {
        ensureScheduleEdit(name);
        const entry = scheduleEdits[name].entries[rowIdx];
        if (entry) {
          if (action === "schedule-at") entry.at = el.value;
          else if (action === "schedule-action") entry.action = el.value;
          else entry.pct = Number(el.value);
          render();
        }
        return;
      }
    }
  }
  // Live-drag visual feedback. `change` fires only on mouseup/blur, so
  // without `input` the right-side `.val` readout sits frozen at the old
  // value while the user drags. Update only the visible text — POSTs
  // still go through the `change` listener below.
  if (!el.matches('input[type="range"]')) return;
  const sliderRow = el.closest(".slider-row");
  const valSpan = sliderRow?.querySelector(".val");
  if (valSpan) valSpan.textContent = `${el.value}%`;
});

// Change handler — covers the manual-slider, the two preset-editor
// sliders, and the match-speeds checkbox. `change` fires on mouseup/blur
// for sliders and on click for checkboxes.
document.addEventListener("change", async (ev) => {
  const el = ev.target;
  const name = el.dataset.name;

  if (el.matches('input[type="range"][data-action="manual-slider"]')) {
    // Touching the manual slider always closes any open preset editor
    // and falls into manual mode. Slider min=0 lets disabled rows show
    // 0% honestly; the protocol's writable range is 10-100 so we clamp
    // up before POSTing.
    delete editingPreset[name];
    const pct = Math.max(10, parseInt(el.value, 10));
    await postWrite(name, "speed", "/v1/devices/" + encodeURIComponent(name) + "/speed",
                    { manual: pct });
    return;
  }

  if (el.matches('input[type="range"][data-action="preset-supply-slider"], input[type="range"][data-action="preset-extract-slider"]')) {
    const preset = parseInt(el.dataset.preset, 10);
    const cfg = lastSnapshots[name]?.configured || {};
    const cur = cfg["preset" + preset] || {};
    // Sub-10% snaps to 0 (off): the protocol register can't store 1..9
    // anyway, and the visual red zone on that part of the track signals
    // "drag here to turn this fan off in the preset". Push the snapped
    // value back into the slider so the thumb visually sits at 0.
    const rawValue = parseInt(el.value, 10);
    const newPct = (rawValue > 0 && rawValue < 10) ? 0 : rawValue;
    if (newPct !== rawValue) el.value = String(newPct);
    const isSupply = el.dataset.action === "preset-supply-slider";
    const matchOn = matchSpeeds[name] !== false;
    // For the un-touched side, prefer the on-screen sibling slider value so
    // a stale or missing cached preset can't silently re-twin the speeds
    // when match-off is set. The DOM value is what the user actually sees.
    const siblingAction = isSupply ? "preset-extract-slider" : "preset-supply-slider";
    const sibling = document.querySelector(
      `input[type="range"][data-action="${siblingAction}"][data-name="${name}"][data-preset="${preset}"]`);
    const siblingPct = sibling ? parseInt(sibling.value, 10) : NaN;
    const fallbackOther = !isNaN(siblingPct)
      ? siblingPct
      : (isSupply ? (typeof cur.extract === "number" ? cur.extract : newPct)
                  : (typeof cur.supply === "number" ? cur.supply : newPct));
    let supply, extract;
    if (matchOn) {
      supply = newPct;
      extract = newPct;
    } else if (isSupply) {
      supply = newPct;
      extract = fallbackOther;
    } else {
      supply = fallbackOther;
      extract = newPct;
    }
    // The protocol's preset register only accepts 10..100; a slider value
    // of 0 means "this fan off in this configuration" and is encoded via
    // airflow_mode (supply / extract single-direction modes) rather than
    // a literal register write. Skip the /preset POST if either side is
    // below 10 so the existing register keeps its last legal value.
    const canWritePreset = supply >= 10 && extract >= 10;
    if (canWritePreset) {
      // Toast key reuses "speed" because the editor lives inside the Speed
      // control — any error surfaces in that block's toast slot.
      await postWrite(name, "speed", "/v1/devices/" + encodeURIComponent(name) + "/preset",
                      { preset, supply, extract });
    }
    // Remember the user's intent for this preset, including 0-side state
    // that the protocol register can't store. Used by preset activation
    // and by re-opening the editor.
    presetVals[name] = presetVals[name] || {};
    presetVals[name][preset] = { supply, extract };
    // Choose airflow_mode for this edit. With automode on (default), the
    // editor always commits to ventilation. With automode off, infer from
    // the future supply/extract pair (regen / supply / extract). Only act
    // when this preset is the active speed_mode — otherwise we'd be
    // changing the running mode based on an inactive preset's edit.
    const speedMode = lastSnapshots[name]?.configured?.speed_mode;
    if (speedMode === "preset" + preset) {
      const impliedMode = computeAirflow(name, supply, extract);
      const currentMode = lastSnapshots[name]?.configured?.airflow_mode;
      if (impliedMode && impliedMode !== currentMode) {
        await applyAirflow(name, impliedMode, supply, extract);
      }
    }
    return;
  }

  if (el.matches('input[type="checkbox"][data-action="match-speeds-toggle"]')) {
    matchSpeeds[name] = el.checked;
    render();
    return;
  }

  if (el.matches('input[type="checkbox"][data-action="automode-toggle"]')) {
    // Toggle just stores the preference; airflow_mode is written when
    // the user next clicks a preset (or completes an editor edit).
    automode[name] = el.checked;
    return;
  }
});

// Pick the airflow_mode that matches a (supply, extract) pair according
// to automode. With automode on (default), commit to ventilation. With
// automode off, derive from the on/off state: both nonzero → regen,
// supply 0 → extract, extract 0 → supply.
function computeAirflow(name, supply, extract) {
  if (automode[name] !== false) return "ventilation";
  if (supply > 0 && extract > 0) return "regeneration";
  if (supply === 0 && extract > 0) return "extract";
  if (extract === 0 && supply > 0) return "supply";
  return null; // both 0 — invalid; leave airflow alone
}

// POST /mode and patch the optimistic overlay so the active fans and
// the highlighted Mode button reflect the new airflow before the
// daemon's poller catches up. Shared between editor edits and preset
// activations so the optimistic shape stays consistent.
async function applyAirflow(name, mode, supply, extract) {
  await postWrite(name, "mode", "/v1/devices/" + encodeURIComponent(name) + "/mode",
                  { mode });
  if (lastSnapshots[name]?.configured) {
    lastSnapshots[name].configured.airflow_mode = mode;
  }
  const supplyRuns = mode === "regeneration" || mode === "supply" || mode === "ventilation";
  const extractRuns = mode === "regeneration" || mode === "extract" || mode === "ventilation";
  setOptimisticLive(name, {
    fan_supply_pct: supplyRuns ? supply : 0,
    fan_extract_pct: extractRuns ? extract : 0,
    fan_supply_rpm: supplyRuns ? null : 0,
    fan_extract_rpm: extractRuns ? null : 0,
  });
  if (lastSnapshots[name]) {
    lastSnapshots[name] = applyOptimisticLive(name, lastSnapshots[name]);
  }
  render();
}

async function postWrite(name, controlKey, url, body, method = "POST") {
  inFlight[name] = true;
  render();
  let ok = false;
  try {
    const r = await fetch(url, {
      method,
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    if (!r.ok) {
      let msg = `HTTP ${r.status}`;
      try {
        const env = await r.json();
        if (env.error) msg = env.error;
      } catch {}
      setToast(name, controlKey, msg);
    } else {
      ok = true;
      clearToast(name, controlKey);
      // Refresh this device immediately so the user sees feedback before
      // the next 5s tick. Other devices unaffected.
      try {
        const snapResp = await fetch("/v1/devices/" + encodeURIComponent(name));
        if (snapResp.ok) {
          lastSnapshots[name] = applyOptimisticLive(name, { ...(await snapResp.json()), _fetchedAt: Date.now() });
        }
      } catch {}
    }
  } catch (e) {
    setToast(name, controlKey, e.message);
  } finally {
    inFlight[name] = false;
    render();
  }
  return ok;
}

function setToast(name, controlKey, msg) {
  if (!toasts[name]) toasts[name] = {};
  toasts[name][controlKey] = msg;
}
function clearToast(name, controlKey) {
  if (toasts[name]) delete toasts[name][controlKey];
}

bootstrap();
</script>
</body>
</html>
