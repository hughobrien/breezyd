<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>breezy</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    margin: 0; padding: 1rem;
    color: #111; background: #f6f6f6;
  }
  header {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 1rem;
  }
  h1 { margin: 0; font-size: 1.25rem; font-weight: 600; }
  .meta { color: #666; font-size: 0.85rem; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
  @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
  .card {
    background: #fff; border: 1px solid #ccc; border-radius: 6px;
    padding: 1rem;
    transition: opacity 0.3s;
  }
  /* Stale card (no poll for >90 s): half-transparent AND fully desaturated.
     Greyscale kills the green power dot, red alerts, heater red, etc., so
     colour signals can't mislead while the underlying data is potentially
     out of date. The .ts.red timestamp still tells the user why. */
  .card.stale { opacity: 0.5; filter: grayscale(1); }
  .card h2 {
    margin: 0; font-size: 1rem; font-weight: 600;
    /* Long device names shouldn't push the on/off indicator off-card. */
    max-width: 65%;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card .ip { color: #666; font-size: 0.85rem; }
  .ts { font-size: 0.85rem; color: #666; }
  .ts.red { color: #c00; }
  .power-on { color: #383; }
  .power-off { color: #c00; }
  .row { display: flex; justify-content: space-between; padding: 0.1rem 0; }
  .k { color: #666; }
  .block,
  .device-info { margin-top: 0.75rem; padding-top: 0.5rem; border-top: 1px solid #eee; }
  .block h3,
  .block summary,
  .device-info summary {
    margin: 0 0 0.25rem; font-size: 0.75rem; font-weight: 600;
    color: #333; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .block summary,
  .device-info summary { cursor: pointer; }
  .block summary::marker,
  .device-info summary::marker { font-size: 0.7em; color: #888; }
  .warn { color: #b07000; font-size: 0.85rem; margin-top: 0.4rem; }
  .err-banner {
    background: #fee; border: 1px solid #c66; padding: 0.75rem;
    border-radius: 6px; margin-bottom: 1rem; color: #800;
  }
  .fw { font-size: 0.75rem; color: #888; margin-top: 0.75rem; padding-top: 0.5rem; border-top: 1px solid #eee; }
  .controls { margin-top: 0.75rem; padding-top: 0.5rem; border-top: 1px solid #eee; }
  .controls h3 {
    margin: 0 0 0.25rem; font-size: 0.75rem; font-weight: 600;
    color: #333; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .ctrl { margin: 0.4rem 0; }
  .ctrl-label { color: #666; font-size: 0.75rem; margin-bottom: 0.15rem; display: block; }
  .seg { display: flex; gap: 0.25rem; flex-wrap: wrap; }
  .seg button, .toggle {
    font-family: inherit; font-size: 0.85rem;
    padding: 0.3rem 0.5rem;
    border: 1px solid #aaa; background: #fafafa;
    border-radius: 4px; cursor: pointer;
  }
  .seg button { flex: 1 1 auto; }
  .toggle    { padding: 0.3rem 0.6rem; width: 100%; }
  .seg button:hover:not(:disabled),
  .toggle:hover:not(:disabled) { background: #eee; border-color: #888; }
  .seg button:focus-visible,
  .toggle:focus-visible        { outline: 2px solid #36c; outline-offset: 1px; }
  /* #276 (vs the lighter #4a7) clears WCAG AA contrast against white. */
  .seg button[aria-pressed="true"],
  .toggle[aria-pressed="true"] { background: #276; color: #fff; border-color: #154; }
  /* The Heater toggle reads as "active heat" — use red instead of the
     default green so it's visually distinct from the Power toggle. */
  .toggle[data-action="heater"][aria-pressed="true"] {
    background: #b22; border-color: #800;
  }
  .seg button:disabled,
  .toggle:disabled             { opacity: 0.5; cursor: not-allowed; }
  .slider-row { display: flex; gap: 0.5rem; align-items: center; }
  .slider-row input[type=range] { flex: 1; }
  /* Symmetric spacer on the left so the slider track sits centered in the
     row instead of being pushed left by the right-side .val readout. */
  .slider-row .val-spacer,
  .slider-row .val { min-width: 3rem; }
  .slider-row .val { text-align: right; font-variant-numeric: tabular-nums; }
  .slider-row input[type=range]:disabled { opacity: 0.5; cursor: not-allowed; }
  .toast {
    background: #fee; border: 1px solid #c66; color: #800;
    padding: 0.3rem 0.4rem; border-radius: 4px; font-size: 0.75rem;
    margin-top: 0.25rem;
  }
  .toggle-row { display: flex; gap: 0.5rem; }
  .toggle-cell { flex: 1 1 0; min-width: 0; }
  .alert-fire { color: #c00; }
  .value-clickable { cursor: pointer; }
  .value-clickable:hover {
    text-decoration: underline;
    text-decoration-style: dotted;
    text-underline-offset: 2px;
  }
  .thresh-edit { display: inline-flex; align-items: center; gap: 0.25rem; }
  .thresh-input {
    width: 4.5rem; padding: 0.1rem 0.25rem;
    font-family: inherit; font-size: 0.85rem;
    border: 1px solid #aaa; border-radius: 3px;
  }
  .thresh-edit button {
    font-family: inherit; font-size: 0.85rem;
    padding: 0.05rem 0.4rem;
    border: 1px solid #aaa; background: #fafafa;
    border-radius: 3px; cursor: pointer;
  }
  .thresh-edit button:hover:not(:disabled) { background: #eee; border-color: #888; }
  .thresh-edit button:disabled,
  .thresh-input:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>
  <header>
    <h1>breezy</h1>
    <span class="meta" id="meta">loading…</span>
  </header>
  <div id="banner"></div>
  <div class="grid" id="grid"></div>
<script>
"use strict";

const POLL_INTERVAL_MS = 5000;
const STALE_THRESHOLD_MS = 90 * 1000;

let deviceNames = [];
const lastSnapshots = {}; // name -> {snapshot fields, _fetchedAt}
// State for in-flight writes. Disables that card's controls while pending.
const inFlight = {}; // name -> bool
// Per-control toasts. Cleared on next successful poll.
const toasts = {}; // name -> { control: msg }
// Per-card threshold editor state. name -> "humidity" | "co2" | "voc".
// Only one threshold can be edited per card at a time.
const editingThreshold = {}; // name -> kind

// Per-card Device Info <details> open state. Set when the user expands
// it manually (captured via the toggle event below) and used during render
// so the panel survives the 5 s grid re-render. The auto-expand-on-fault
// rule ORs with this — a user-collapsed panel re-opens on the next render
// if a fault appears.
const deviceInfoOpen = {}; // name -> bool

// Per-kind config for the editable sensor rows. Mirrors the daemon's
// SetThreshold validation: humidity 40-80, co2 400-2000 step 10, voc 50-250.
const THRESHOLD_KINDS = {
  humidity: { label: "RH",   suffix: "%",   min: 40,  max: 80,   step: 1,
              valueKey: "humidity_pct",   thresholdKey: "humidity_threshold_pct",  alertKey: "humidity" },
  co2:      { label: "eCO₂", suffix: "ppm", min: 400, max: 2000, step: 10,
              valueKey: "eco2_ppm",       thresholdKey: "co2_threshold_ppm",       alertKey: "co2" },
  voc:      { label: "VOC",  suffix: "idx", min: 50,  max: 250,  step: 1,
              valueKey: "voc_index",      thresholdKey: "voc_threshold_index",     alertKey: "voc",
              tooltip: "VOC Index — Sensirion 0-500 scale, ~100 = baseline indoor air" },
};

async function bootstrap() {
  try {
    const r = await fetch("/v1/devices");
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    deviceNames = (data.devices || []).map(d => d.name).sort();
    clearBanner();
    render();
    await refreshAll();
    setInterval(refreshAll, POLL_INTERVAL_MS);
    setInterval(updateMeta, 1000);
  } catch (e) {
    showBanner(`cannot reach daemon — is breezyd running? (${e.message})`);
    setTimeout(bootstrap, POLL_INTERVAL_MS);
  }
}

function showBanner(msg) {
  document.getElementById("banner").innerHTML =
    `<div class="err-banner" role="alert">${esc(msg)}</div>`;
}
function clearBanner() {
  document.getElementById("banner").innerHTML = "";
}

async function refreshAll() {
  const results = await Promise.allSettled(
    deviceNames.map(n =>
      fetch(`/v1/devices/${encodeURIComponent(n)}`)
        .then(r => r.ok ? r.json() : Promise.reject(new Error(`HTTP ${r.status}`)))
        .then(snap => ({ name: n, snap }))
    )
  );
  for (const res of results) {
    if (res.status === "fulfilled") {
      lastSnapshots[res.value.name] = { ...res.value.snap, _fetchedAt: Date.now() };
      // Clear all toasts for this device on a successful refresh.
      delete toasts[res.value.name];
    }
  }
  render();
}

function render() {
  document.getElementById("grid").innerHTML =
    deviceNames.map(name => renderCard(name, lastSnapshots[name])).join("");
  updateMeta();
}

function updateMeta() {
  const meta = document.getElementById("meta");
  const last = Math.max(0, ...Object.values(lastSnapshots).map(s => s._fetchedAt || 0));
  meta.textContent = last === 0 ? "no data yet" : `refreshed ${humanAgo(Date.now() - last)} ago`;
}

function renderCard(name, snap) {
  if (!snap) {
    return `<div class="card stale">
      <h2>${esc(name)}</h2>
      <div class="ts">no data</div>
    </div>`;
  }
  const lastPollMs = snap.last_poll ? new Date(snap.last_poll).getTime() : 0;
  const ageMs = lastPollMs ? Date.now() - lastPollMs : Infinity;
  const stale = ageMs > STALE_THRESHOLD_MS;
  const power = snap.configured?.power;
  const powerLabel = power === true ? "on" : power === false ? "off" : "?";
  const powerCls  = power === true ? "power-on" : "power-off";

  const fwVersion = snap.firmware?.version ? esc(snap.firmware.version) : "—";
  const fwDate = snap.firmware?.build_date ? esc(snap.firmware.build_date) : "—";

  // Device Info <details> is collapsed by default. Auto-expand when a
  // service condition wants attention (active fault OR soiled filter),
  // OR when the user previously expanded it (deviceInfoOpen[name] survives
  // the 5 s re-render via the toggle listener at the bottom of the file).
  const fault = snap.service?.fault_level;
  const filter = snap.service?.filter_status;
  const needsAttention =
    (fault && fault !== "none") || (filter && filter !== "clean");
  const infoOpen = needsAttention || deviceInfoOpen[name] === true;
  return `<div class="card${stale ? " stale" : ""}">
    <div class="row">
      <h2>${esc(name)}</h2>
      <span class="${powerCls}">● ${powerLabel}</span>
    </div>
    <div class="row">
      <span class="ts${stale ? " red" : ""}">${lastPollMs ? humanAgo(ageMs) + " ago" : "no poll"}</span>
    </div>
    <details class="device-info"${infoOpen ? " open" : ""}>
      <summary>Device</summary>
      ${kv("ip",               esc(snap.ip || "?"))}
      ${kv("serial",           esc(snap.id || "?"))}
      ${kv("firmware version", fwVersion)}
      ${kv("firmware date",    fwDate)}
      ${kv("filter",           filterStatus(snap.service))}
      ${kv("motor",            humanSeconds(snap.service?.motor_lifetime_seconds))}
      ${kv("RTC",              fmt(snap.service?.rtc_battery_volts, "—", "V"))}
      ${kv("faults",           fmt(snap.service?.fault_level, "—"))}
    </details>

    <div class="block">
      <h3>Sensors</h3>
      ${thresholdRow(name, "humidity", snap)}
      ${thresholdRow(name, "co2",      snap)}
      ${thresholdRow(name, "voc",      snap)}
      ${kv("outdoor",  tempC(snap.sensors?.temp_outdoor_c))}
      ${kv("supply",   tempC(snap.sensors?.temp_supply_c))}
      ${kv("recovery", fmt(snap.sensors?.recovery_efficiency_pct, "—", "%"))}
    </div>

    <div class="block">
      <h3>Fans</h3>
      ${kv("supply",   fanLine(snap.live?.fan_supply_pct, snap.live?.fan_supply_rpm))}
      ${kv("extract",  fanLine(snap.live?.fan_extract_pct, snap.live?.fan_extract_rpm))}
      ${overrideLine(snap.live)}
    </div>

    ${renderControls(name, snap, stale)}
  </div>`;
}

function kv(k, v) {
  return `<div class="row"><span class="k">${esc(k)}</span><span>${v}</span></div>`;
}

function thresholdRow(name, kind, snap) {
  const cfg = THRESHOLD_KINDS[kind];
  const live = snap.sensors?.[cfg.valueKey];
  const thresh = snap.configured?.[cfg.thresholdKey];
  const alerting = snap.live?.sensor_alerts?.[cfg.alertKey] === true;
  const editing = editingThreshold[name] === kind;
  const t = toasts[name] || {};
  const toastKey = "threshold-" + kind;
  const stale = (snap._fetchedAt
    ? (Date.now() - new Date(snap.last_poll).getTime()) > STALE_THRESHOLD_MS
    : false);
  const disabled = inFlight[name] || stale;
  const dis = disabled ? "disabled" : "";

  const liveStr = (live === null || live === undefined) ? "—" : `${live}${cfg.suffix}`;
  const liveCls = alerting ? "alert-fire" : "";
  const toastEl = t[toastKey] ? `<div class="toast" role="alert">${esc(t[toastKey])}</div>` : "";
  const titleAttr = cfg.tooltip ? ` title="${esc(cfg.tooltip)}"` : "";

  if (editing) {
    const inputVal = (thresh === null || thresh === undefined) ? cfg.min : thresh;
    return `<div class="row"${titleAttr}>
      <span class="k">${esc(cfg.label)}</span>
      <span class="thresh-edit">
        <span class="${liveCls}">${esc(liveStr)}</span>
        <span class="thresh-edit-label">set alert ≥</span>
        <input type="number" min="${cfg.min}" max="${cfg.max}" step="${cfg.step}"
               value="${inputVal}"
               data-name="${esc(name)}" data-kind="${esc(kind)}"
               class="thresh-input" ${dis}>${esc(cfg.suffix)}
        <button data-action="threshold-save" data-name="${esc(name)}" data-kind="${esc(kind)}" ${dis}>✓</button>
        <button data-action="threshold-cancel" data-name="${esc(name)}" data-kind="${esc(kind)}" ${dis}>✕</button>
      </span>
    </div>${toastEl}`;
  }

  // Display state: show only the live value. The threshold lives in the
  // editor that opens on click — keeping the row uncluttered while making
  // the editor itself self-explanatory ("set alert ≥ N").
  return `<div class="row"${titleAttr}>
    <span class="k">${esc(cfg.label)}</span>
    <span>
      <span class="value-clickable ${liveCls}"
            data-action="edit-threshold" data-name="${esc(name)}" data-kind="${esc(kind)}"
            >${esc(liveStr)}</span>
    </span>
  </div>${toastEl}`;
}

function tempC(v) {
  return (v === null || v === undefined) ? "—" : `${esc(v.toFixed(1))}°C`;
}

function fmt(v, fallback, suffix) {
  if (v === null || v === undefined) return fallback;
  return `${esc(String(v))}${suffix || ""}`;
}

function fanLine(pct, rpm) {
  if (rpm === null || rpm === undefined) return "—";
  if (pct === null || pct === undefined) return `${esc(String(rpm))}rpm`;
  return `${esc(String(pct))}% ${esc(String(rpm))}rpm`;
}

function filterStatus(svc) {
  if (!svc) return "—";
  const status = svc.filter_status || "—";
  const remaining = svc.filter_remaining_seconds;
  if (remaining === undefined) return esc(status);
  const days = Math.floor(remaining / 86400);
  return `${esc(status)} (${days}d)`;
}

function overrideLine(live) {
  if (!live || live.in_user_control !== false) return "";
  const alerts = live.sensor_alerts || {};
  const reasons = ["humidity", "co2", "voc"].filter(k => alerts[k]);
  if (reasons.length > 0) {
    return `<div class="warn">⚠ sensor override (${reasons.join(", ")}) — fan above setting</div>`;
  }
  if (live.special_mode === "turbo") {
    return `<div class="warn">⚠ timer active (turbo) — fan above setting</div>`;
  }
  if (live.special_mode === "night") {
    return `<div class="warn">⚠ timer active (night) — fan slowed</div>`;
  }
  // Frost protection or unknown override; stay silent (out of scope).
  return "";
}

function humanAgo(ms) {
  const s = Math.max(0, Math.floor(ms / 1000));
  if (s < 60) return `${s}s`;
  const m = Math.floor(s / 60);
  if (m < 60) return `${m}m ${s % 60}s`;
  const h = Math.floor(m / 60);
  return `${h}h ${m % 60}m`;
}

function humanSeconds(secs) {
  if (secs === null || secs === undefined) return "—";
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  return `${h}h ${m}m`;
}

function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

function renderControls(name, snap, stale) {
  const cfg = snap.configured || {};
  const disabled = stale || inFlight[name];
  const power = cfg.power === true;
  const heater = cfg.heater_enabled === true;
  const mode = cfg.airflow_mode || "";
  const speedMode = cfg.speed_mode || "";  // "preset1".."preset3" | "manual"
  const manualPct = typeof cfg.manual_pct === "number" ? cfg.manual_pct : 50;
  const dis = disabled ? "disabled" : "";
  const t = toasts[name] || {};

  const specialMode = snap.live?.special_mode || "off";  // "off" | "night" | "turbo"
  const remainingSecs = snap.live?.special_mode_remaining_seconds;

  const timerBtn = (label, value) =>
    `<button data-action="timer" data-name="${esc(name)}" data-value="${esc(value)}" ${dis}
        aria-pressed="${specialMode === value ? "true" : "false"}">${esc(label)}</button>`;

  const modeBtn = (label, value) =>
    `<button data-action="mode" data-name="${esc(name)}" data-value="${esc(value)}" ${dis}
        aria-pressed="${mode === value ? "true" : "false"}">${esc(label)}</button>`;

  const presetBtn = (n) =>
    `<button data-action="preset" data-name="${esc(name)}" data-value="${n}" ${dis}
        aria-pressed="${speedMode === "preset" + n ? "true" : "false"}">${n}</button>`;


  return `<div class="controls">
    <h3>Controls</h3>

    <div class="ctrl">
      <div class="toggle-row">
        <div class="toggle-cell">
          <button class="toggle" data-action="power" data-name="${esc(name)}" ${dis}
            aria-pressed="${power ? "true" : "false"}">
            power
          </button>
          ${t.power ? `<div class="toast" role="alert">${esc(t.power)}</div>` : ""}
        </div>
        <div class="toggle-cell">
          <button class="toggle" data-action="heater" data-name="${esc(name)}" ${dis}
            aria-pressed="${heater ? "true" : "false"}">
            heater
          </button>
          ${t.heater ? `<div class="toast" role="alert">${esc(t.heater)}</div>` : ""}
        </div>
      </div>
    </div>

    <div class="ctrl">
      <span class="ctrl-label">Mode</span>
      <div class="seg">
        ${modeBtn("auto",    "ventilation")}
        ${modeBtn("regen",   "regeneration")}
        ${modeBtn("supply",  "supply")}
        ${modeBtn("extract", "extract")}
      </div>
      ${t.mode ? `<div class="toast" role="alert">${esc(t.mode)}</div>` : ""}
    </div>

    <div class="ctrl">
      <span class="ctrl-label">Timer</span>
      <div class="seg">
        ${timerBtn("night", "night")}
        ${timerBtn("turbo", "turbo")}
      </div>
      ${specialMode !== "off" && typeof remainingSecs === "number"
        ? `<div class="ctrl-label">${esc(humanSeconds(remainingSecs))} remaining</div>`
        : ""}
      ${t.timer ? `<div class="toast" role="alert">${esc(t.timer)}</div>` : ""}
    </div>

    <div class="ctrl">
      <span class="ctrl-label">Speed</span>
      <div class="seg">
        ${presetBtn(1)}
        ${presetBtn(2)}
        ${presetBtn(3)}
      </div>
      <div class="slider-row">
        <span class="val-spacer"></span>
        <input type="range" min="10" max="100" step="5"
          value="${manualPct}"
          data-action="manual-slider" data-name="${esc(name)}" ${dis}>
        <span class="val">${manualPct}%</span>
      </div>
      ${t.speed ? `<div class="toast" role="alert">${esc(t.speed)}</div>` : ""}
    </div>

  </div>`;
}

// Single delegated click handler for all control buttons and clickable
// values (the threshold edit-target). Match any [data-action] so spans
// like the threshold value can dispatch alongside <button>s.
document.addEventListener("click", async (ev) => {
  const el = ev.target.closest("[data-action]");
  if (!el) return;
  const name = el.dataset.name;
  const action = el.dataset.action;
  const value = el.dataset.value;
  const kind = el.dataset.kind;
  const snap = lastSnapshots[name];
  if (!snap) return;

  switch (action) {
    case "power":
      await postWrite(name, "power", "/v1/devices/" + encodeURIComponent(name) + "/power",
                      { on: !snap.configured?.power });
      break;
    case "mode":
      await postWrite(name, "mode", "/v1/devices/" + encodeURIComponent(name) + "/mode",
                      { mode: value });
      break;
    case "preset":
      await postWrite(name, "speed", "/v1/devices/" + encodeURIComponent(name) + "/speed",
                      { preset: parseInt(value, 10) });
      break;
    case "heater":
      await postWrite(name, "heater", "/v1/devices/" + encodeURIComponent(name) + "/heater",
                      { on: !snap.configured?.heater_enabled });
      break;
    case "timer": {
      // Toggle: clicking the already-active mode stops the timer.
      const current = snap.live?.special_mode || "off";
      const next = current === value ? "off" : value;
      await postWrite(name, "timer", "/v1/devices/" + encodeURIComponent(name) + "/timer",
                      { mode: next });
      break;
    }
    case "edit-threshold":
      editingThreshold[name] = kind;
      render();
      // Focus the freshly-rendered input so users can type immediately.
      const input = document.querySelector(
        `.thresh-input[data-name="${name}"][data-kind="${kind}"]`);
      if (input) { input.focus(); input.select(); }
      break;
    case "threshold-save":
      await saveThreshold(name, kind);
      break;
    case "threshold-cancel":
      delete editingThreshold[name];
      render();
      break;
  }
});

// Enter saves, Escape cancels while inside a threshold-edit input.
document.addEventListener("keydown", async (ev) => {
  const el = ev.target;
  if (!el.classList || !el.classList.contains("thresh-input")) return;
  if (ev.key === "Enter") {
    ev.preventDefault();
    await saveThreshold(el.dataset.name, el.dataset.kind);
  } else if (ev.key === "Escape") {
    ev.preventDefault();
    delete editingThreshold[el.dataset.name];
    render();
  }
});

async function saveThreshold(name, kind) {
  const input = document.querySelector(
    `.thresh-input[data-name="${name}"][data-kind="${kind}"]`);
  if (!input) return;
  const value = parseInt(input.value, 10);
  if (isNaN(value)) return;
  const ok = await postWrite(name, "threshold-" + kind,
    "/v1/devices/" + encodeURIComponent(name) + "/threshold",
    { kind, value });
  if (ok) {
    delete editingThreshold[name];
    render();
  }
}

// Capture-phase listener for `toggle` events on Device <details> elements.
// `toggle` does not bubble, so capture is required to intercept it. The
// device name is read from the card's <h2> rather than threading a
// data-attribute through, which keeps the markup minimal.
document.addEventListener("toggle", (ev) => {
  const el = ev.target;
  if (!el.classList?.contains("device-info")) return;
  const name = el.closest(".card")?.querySelector("h2")?.textContent;
  if (el.open) {
    deviceInfoOpen[name] = true;
  } else {
    delete deviceInfoOpen[name];
  }
}, true);

// Slider handler — fires on `change` (mouseup/blur), not `input`.
document.addEventListener("change", async (ev) => {
  const el = ev.target;
  if (!el.matches('input[type="range"][data-action="manual-slider"]')) return;
  const name = el.dataset.name;
  const pct = parseInt(el.value, 10);
  await postWrite(name, "speed", "/v1/devices/" + encodeURIComponent(name) + "/speed",
                  { manual: pct });
});

async function postWrite(name, controlKey, url, body) {
  inFlight[name] = true;
  render();
  let ok = false;
  try {
    const r = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    if (!r.ok) {
      let msg = `HTTP ${r.status}`;
      try {
        const env = await r.json();
        if (env.error) msg = env.error;
      } catch {}
      setToast(name, controlKey, msg);
    } else {
      ok = true;
      clearToast(name, controlKey);
      // Refresh this device immediately so the user sees feedback before
      // the next 5s tick. Other devices unaffected.
      try {
        const snapResp = await fetch("/v1/devices/" + encodeURIComponent(name));
        if (snapResp.ok) {
          lastSnapshots[name] = { ...(await snapResp.json()), _fetchedAt: Date.now() };
        }
      } catch {}
    }
  } catch (e) {
    setToast(name, controlKey, e.message);
  } finally {
    inFlight[name] = false;
    render();
  }
  return ok;
}

function setToast(name, controlKey, msg) {
  if (!toasts[name]) toasts[name] = {};
  toasts[name][controlKey] = msg;
}
function clearToast(name, controlKey) {
  if (toasts[name]) delete toasts[name][controlKey];
}

bootstrap();
</script>
