# Example breezyd configuration for daemon mode + at least one device.
#
# Install path: /etc/breezyd/breezyd.toml — mode 0600, owned by the
# breezyd service user. The daemon refuses to start with a
# world-readable file (the protocol password is stored cleartext).
#
# Run `breezy discover` (or `breezy discover <IP> ...` if broadcast is
# blocked) to find your unit IDs first. The device-block ip line is
# optional in daemon mode if on-start discovery is enabled.
#
# See README.md "Linux + systemd" for the surrounding setup.

[daemon]
listen        = "127.0.0.1:9876"
poll_interval = "30s"
discovery     = "on-start"   # "on-start" | "off" | "periodic:<duration>"
# Fleet-wide protocol password. Used for the daemon's wildcard
# discovery probes and inherited by any [devices.NAME] block that
# omits its own `password`. Default factory password is "1111".
password      = "your-protocol-password"

# One [devices.<name>] block per Breezy unit. The name is free-form
# but cannot collide with CLI globals (ls, discover, daemon-url, param,
# version, help).

[devices.bedroom]
id = "BREEZY0000000000"
ip = "192.168.1.148"
# Per-device password override (optional — falls back to [daemon].password):
# password = "different-password"

[devices.office]
id = "BREEZY0000000001"
ip = "192.168.1.152"

[devices.playroom]
id = "BREEZY0000000002"
ip = "192.168.1.160"

# Optional: enable the HomeKit bridge.
# [homekit]
# enabled     = true
# bridge_name = "breezyd"
# port        = 51827          # pin (default 0 is ephemeral; can't firewall)
# state_dir   = "/var/lib/breezyd"
