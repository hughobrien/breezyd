name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: vet + test + build
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify modules tidy
        run: |
          go mod download
          go mod verify

      - name: Vet
        run: go vet ./...

      - name: gofmt
        run: |
          bad=$(gofmt -l .)
          if [ -n "$bad" ]; then
            echo "::error::gofmt drift in:"
            echo "$bad"
            echo "Run 'just fmt' (or 'gofmt -w .') and commit."
            exit 1
          fi

      - name: Test (race)
        run: go test -race ./...

      - name: Build
        run: |
          go build -o /tmp/breezyd ./cmd/breezyd
          go build -o /tmp/breezy ./cmd/breezy
          /tmp/breezyd --version
          /tmp/breezy --version
