name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Fast lane: vet + gofmt + race tests + build smoke. Mirrors `just check`
  # plus `just test-race` plus a build-and---version sanity check.
  test:
    name: vet + race + build
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify modules tidy
        run: |
          go mod download
          go mod verify

      - name: Vet
        run: go vet ./...

      - name: gofmt
        run: |
          bad=$(gofmt -l .)
          if [ -n "$bad" ]; then
            echo "::error::gofmt drift in:"
            echo "$bad"
            echo "Run 'just fmt' (or 'gofmt -w .') and commit."
            exit 1
          fi

      - name: Race tests
        run: CGO_ENABLED=1 CC=clang go test -race ./...

      - name: Build
        run: |
          go build -o /tmp/breezyd ./cmd/breezyd
          go build -o /tmp/breezy ./cmd/breezy
          /tmp/breezyd --version
          /tmp/breezy --version

  # golangci-lint = `just test-staticcheck`. errcheck is the strict bit —
  # catches unchecked error returns that `go vet` alone misses.
  staticcheck:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  # Address sanitizer = `just test-asan`. Catches OOB / use-after-free in cgo.
  asan:
    name: asan tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: ASan tests
        run: CGO_ENABLED=1 CC=clang go test -asan ./...

  # Memory sanitizer = `just test-msan`. Catches reads of uninitialised
  # memory in cgo paths.
  msan:
    name: msan tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: MSan tests
        run: CGO_ENABLED=1 CC=clang go test -msan ./...

  # Playwright dashboard tests = `just test-ui`. Validates the embedded
  # UI's HTTP-call contract via page.route() mocking; no real daemon needed.
  ui:
    name: Playwright
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v5
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: tests/ui/pnpm-lock.yaml
      - name: Install deps
        working-directory: tests/ui
        run: pnpm install --frozen-lockfile
      - name: Install Chromium + system deps
        working-directory: tests/ui
        run: pnpm exec playwright install --with-deps chromium
      - name: Run Playwright
        working-directory: tests/ui
        run: pnpm exec playwright test
