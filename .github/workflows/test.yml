name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: vet + test + build
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify modules tidy
        run: |
          go mod download
          go mod verify

      - name: Vet
        run: go vet ./...

      - name: Test (race)
        run: go test -race ./...

      - name: Build
        run: |
          go build -o /tmp/breezyd ./cmd/breezyd
          go build -o /tmp/breezy ./cmd/breezy
          /tmp/breezyd --version
          /tmp/breezy --version
