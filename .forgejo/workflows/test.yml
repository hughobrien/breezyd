name: ci
# Merge gate: runs the test suite HERMETICALLY as a pure nix build of the
# flake's checks.gate (vet + gofmt + go test + race + golangci-lint +
# test-test-admin) inside nix's sandbox — no host /etc, network, or live
# daemon leaks. Branch protection on main requires this check.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  gate:
    runs-on: native
    steps:
      - run: |
          umask 077
          cat > "$HOME/.netrc" <<NETRC
          machine forgejo.wg login x-access-token password ${{ github.token }}
          NETRC
          nix build --no-write-lock-file -L \
            "git+https://forgejo.wg/hughobrien/breezyd.git?ref=${{ github.ref_name }}&rev=${{ github.sha }}#checks.x86_64-linux.gate"
          rm -f "$HOME/.netrc"
